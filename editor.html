<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>HTML + JS Runner</title>
</head>
<body>

<h2>HTML + JavaScript Runner</h2>

<textarea id="code" style="width:100%;height:220px;font-family:monospace;">
<h1>Hello</h1>
<script>
console.log("JS is running!");
</script>
</textarea>

<br><br>
<button onclick="run()">Run</button>

<iframe id="out" style="width:100%;height:350px;border:1px solid #999;"></iframe>

<script>
function run() {
    const html = document.getElementById("code").value;
    const iframe = document.getElementById("out");
    const doc = iframe.contentDocument || iframe.contentWindow.document;

    doc.open();
    doc.write(html);
    doc.close();
}
</script>

</body>
</html>
