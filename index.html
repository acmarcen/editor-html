<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Code Runner (HTML + CSS + JS)</title>

<style>
body {
  font-family: Arial, sans-serif;
  margin: 20px;
}

textarea {
  width: 100%;
  height: 220px;
  font-family: monospace;
  font-size: 14px;
  padding: 10px;
}

.editors-container {
  display: flex;
  gap: 20px;
  margin-bottom: 20px;
}

.editor-box {
  flex: 1;
  display: flex;
  flex-direction: column;
}

.container {
  display: flex;
  width: 100%;
  margin-top: 20px;
  gap: 20px;
}

.output-box {
  flex: 1;
  display: flex;
  flex-direction: column;
}

iframe {
  height: 400px;
  width: 100%;
  border: 1px solid #aaa;
}

/* Consola visual (opcional) */
.console-box {
  background: #000;
  color: #0f0;
  padding: 10px;
  height: 400px;
  overflow-y: auto;
  font-family: monospace;
  border: 1px solid #444;
}
</style>
</head>

<body>

<h2>Editor de HTML, CSS y JavaScript</h2>

<div class="editors-container">

  <div class="editor-box">
    <h3>HTML</h3>
    <textarea id="htmlInput"></textarea>
  </div>

  <div class="editor-box">
    <h3>CSS</h3>
    <textarea id="cssInput"></textarea>
  </div>

  <div class="editor-box">
    <h3>JavaScript</h3>
    <textarea id="jsInput"></textarea>
  </div>

</div>

<button onclick="runCode()" style="padding:10px 20px;">Ejecutar</button>

<div class="container">

  <div class="output-box">
    <h3>Resultado</h3>
    <iframe id="output"></iframe>
  </div>

  <div class="output-box">
    <h3>Consola Visual (opcional)</h3>
    <div id="console" class="console-box"></div>
  </div>

</div>

<script>
function runCode() {
    const html = document.getElementById("htmlInput").value;
    const css  = document.getElementById("cssInput").value;
    const js   = document.getElementById("jsInput").value;

    const iframe = document.getElementById("output");
    const doc = iframe.contentDocument || iframe.contentWindow.document;

    // Limpia consola visual
    document.getElementById("console").innerHTML = "";

    // Construye el contenido del iframe
    const finalCode = `
<!DOCTYPE html>
<html>
<head>
<style>
${css}
</style>
</head>
<body>

${html}

<script>
// Redirige console.log al panel visual sin bloquear la consola real
const parentConsole = parent.document.getElementById("console");
const originalLog = console.log;

console.log = function(...args) {
    originalLog.apply(console, args);
    parentConsole.innerHTML += args.join(" ") + "<br>";
};

// Inserta JS del usuario
${js}

<\/script>

</body>
</html>;

    doc.open();
    doc.write(finalCode);
    doc.close();
}
</script>

</body>
</html>
