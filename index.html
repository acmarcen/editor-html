<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Code Runner with Console</title>
<style>

body {
  font-family: Arial, sans-serif;
}

textarea {
  width: 100%;
  height: 200px;
  font-family: monospace;
  font-size: 14px;
}

.container {
  display: flex;
  width: 100%;
  margin-top: 15px;
  gap: 10px;
}

.output-box {
  flex: 1;
  display: flex;
  flex-direction: column;
}

.console-box {
  flex: 1;
  background: #000;
  color: #0f0;
  padding: 10px;
  height: 350px;
  overflow-y: auto;
  font-family: monospace;
  font-size: 14px;
  border: 1px solid #444;
}

iframe {
  height: 350px;
  width: 100%;
  border: 1px solid #aaa;
}
</style>
</head>
<body>

<h2>Introduce here your code</h2>

<textarea id="code">
</textarea>

<br>
<button onclick="run()">Run</button>


  
<div class="container">
  
  <div class="output-box">
    <h3>Output</h3>
    <iframe id="output"></iframe>
  </div>
  
  <div class="output-box">
    <h3>Console</h3>
    <div id="console" class="console-box"></div>
  </div>

</div>

<script>
function run() {
    const code = document.getElementById("code").value;
    const iframe = document.getElementById("output");
    const doc = iframe.contentDocument || iframe.contentWindow.document;
    const consoleBox = document.getElementById("console");
    consoleBox.innerHTML = ""; //clean console

    const html = `
      <script>
        const parentConsole = parent.document.getElementById("console");
        console.log = function(msg){
          parentConsole.innerHTML += msg + "<br>";
        };
      <\/script>
      ${code}
    `;

    doc.open();
    doc.write(html);
    doc.close();
}
</script>

</body>
</html>
