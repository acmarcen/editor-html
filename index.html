<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Live Code Editor</title>

<style>
body {
  font-family: Arial;
  margin: 20px;
}

.editors {
  display: flex;
  gap: 10px;
}

.editor-box {
  flex: 1;
  display: flex;
  flex-direction: column;
}

.editor-box h3 {
  margin-bottom: 5px;
}
  
textarea {
  width: 100%;
  height: 150px;
  font-family: monospace;
}

iframe {
  width: 100%;
  height: 150px;
  margin-top: 20px;
  border: 1px solid #aaa;
}

button {
  margin-top: 15px;
  padding: 10px 20px;
  font-size: 16px;
}
</style>
</head>

<body>

<div class="editors">

  <div class="editor-box">
    <h3>HTML</h3>
    <textarea id="html" placeholder="HTML"></textarea>
  </div>

  <div class="editor-box">
    <h3>CSS</h3>
    <textarea id="css" placeholder="CSS"></textarea>
  </div>

  <div class="editor-box">
    <h3>JavaScript</h3>
    <textarea id="js" placeholder="JavaScript"></textarea>
  </div>

</div>

<button onclick="runCode()">RUN</button>

<iframe id="output"></iframe>

<script>
function runCode() {
  const html = document.getElementById("html").value;
  const css = document.getElementById("css").value;
  const js = document.getElementById("js").value;

  const iframe = document.getElementById("output");

  const code = `
    <!DOCTYPE html>
    <html>
    <head>
      <style>${css}</style>
    </head>
    <body>
      ${html}
      <script>
        ${js}
      <\/script>
    </body>
    </html>
  `;

  iframe.srcdoc = code;
}
</script>

</body>
</html>
