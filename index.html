<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Live Code Editor</title>

<style>
body {
  font-family: Arial;
  margin: 20px;
}

.editors {
  display: flex;
  gap: 10px;
}

textarea {
  width: 100%;
  height: 200px;
  font-family: monospace;
}

iframe {
  width: 100%;
  height: 400px;
  margin-top: 20px;
  border: 1px solid #aaa;
}
</style>
</head>

<body>

<h2>Editor en tiempo real</h2>

<div class="editors">
  <textarea id="html" placeholder="HTML"></textarea>
  <textarea id="css" placeholder="CSS"></textarea>
  <textarea id="js" placeholder="JavaScript"></textarea>
</div>

<iframe id="output"></iframe>

<script>
const htmlInput = document.getElementById("html");
const cssInput = document.getElementById("css");
const jsInput = document.getElementById("js");
const iframe = document.getElementById("output");

function update() {
  const html = htmlInput.value;
  const css = cssInput.value;
  const js = jsInput.value;

  const code = `
    <!DOCTYPE html>
    <html>
    <head>
      <style>${css}</style>
    </head>
    <body>
      ${html}
      <script>
        ${js}
      <\/script>
    </body>
    </html>
  `;

  iframe.srcdoc = code;
}

// Ejecutar en tiempo real
htmlInput.addEventListener("input", update);
cssInput.addEventListener("input", update);
jsInput.addEventListener("input", update);

// Código inicial de ejemplo
htmlInput.value = "<h1>Hola mundo</h1>";
cssInput.value = "h1 { color: blue; }";
jsInput.value = "console.log('JS funcionando');";

update();
</script>

</body>
</html>
